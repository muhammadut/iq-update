# Pattern: alert_message
# OPERATION-LEVEL pattern for the Logic Modifier (NOT a first-class SRD type).
#
# This is a SUBPATTERN of eligibility_rules. The Intake agent classifies
# alert-related tickets as type "eligibility_rules" (the SRD type). The
# Decomposer then creates individual operations with pattern "alert_message"
# for the Logic Modifier to handle.
#
# Classification hints below help the Intake agent RECOGNIZE alert language
# within a ticket, which it then classifies as eligibility_rules.
# Example: "Do Not Bind for Grade 3 risks" → SRD type: eligibility_rules,
#          Decomposer operation pattern: alert_message.

name: alert_message
description: "Insert AlertHab or system alert calls triggered by underwriting rules"
complexity: COMPLEX
agents:
  - logic-modifier

classification_hints:
  - "do not bind"
  - "not rated"
  - "alert"
  - "system alert"
  - "AlertHab"
  - "warning message"
  - "trigger alert"

parameters:
  - name: alert_type
    type: string
    description: "TBW alert action (e.g., aaAlertAction.aanotrated, aaAlertAction.aadonotbind)"
    example: "aaAlertAction.aanotrated"
  - name: condition
    type: string
    description: "VB.NET boolean expression that triggers the alert"
    example: "CoverageType = ELITECOMP And YearBuilt < 1990"
  - name: alert_message
    type: string
    description: "Human-readable message displayed in the alert"
    example: "Elite Comp not available for properties built before 1990"
  - name: target_function
    type: string
    description: "Function where the alert check should be inserted (e.g., ValidateData)"
    example: "ValidateData"

validators:
  - traceability
